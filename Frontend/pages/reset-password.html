<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - NAgCO</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../images/logo.png">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <img src="../images/logo.png" alt="NAgCO Loan Management System Logo">
                <h2>NAgCO Loan Management System</h2>
                <p>Napilihan Agriculture Cooperative</p>
            </div>

            <form id="resetPasswordForm">
                <div class="input-group">
                    <label>New Password</label>
                    <div class="input-field">
                        <i class="fa fa-lock"></i>
                        <input type="password" id="newPassword" placeholder="Enter new password" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Confirm New Password</label>
                    <div class="input-field">
                        <i class="fa fa-check-circle"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    </div>
                </div>

                <button type="submit" class="login-btn">Reset Password</button>
                <p id="statusMessage" style="margin-top:10px; font-size:13px; color:#666; text-align:center;"></p>
            </form>

            <div class="signup-link">
                <a href="login.html">Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:5000/api";
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        const statusEl = document.getElementById("statusMessage");

        if (!token) {
            statusEl.innerText = "Invalid or missing reset token.";
            statusEl.style.color = "#c62828";
            document.getElementById("resetPasswordForm").style.display = "none";
        }

        document.getElementById("resetPasswordForm").addEventListener("submit", async function (event) {
            event.preventDefault();
            statusEl.innerText = "Resetting...";
            statusEl.style.color = "#666";

            const newPassword = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (newPassword !== confirmPassword) {
                statusEl.innerText = "Passwords do not match.";
                statusEl.style.color = "#c62828";
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/reset-password`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token, new_password: newPassword })
                });

                const data = await response.json();

                if (data.success) {
                    statusEl.style.color = "#2e7d32";
                    statusEl.innerText = "Password reset successfully! Redirecting to login...";
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 2000);
                } else {
                    statusEl.style.color = "#c62828";
                    statusEl.innerText = data.message || "Reset failed.";
                }
            } catch (error) {
                statusEl.style.color = "#c62828";
                statusEl.innerText = "Cannot connect to server.";
            }
        });
    </script>
</body>

</html>
