<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - NAgCO</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../images/logo.png">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <img src="../images/logo.png" alt="NAgCO Loan Management System Logo">
                <h2>NAgCO Loan Management System</h2>
                <p>Napilihan Agriculture Cooperative</p>
            </div>

            <form id="forgotPasswordForm">
                <div class="input-group">
                    <label>Email or Username</label>
                    <div class="input-field">
                        <i class="fa fa-envelope"></i>
                        <input type="text" id="email" placeholder="Enter email or username" required>
                    </div>
                </div>

                <button type="submit" class="login-btn">Send Reset Link</button>
                <p id="statusMessage" style="margin-top:10px; font-size:13px; color:#666; text-align:center;"></p>
            </form>

            <div class="signup-link">
                <a href="login.html">Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:5000/api";

        document.getElementById("forgotPasswordForm").addEventListener("submit", async function (event) {
            event.preventDefault();
            const statusEl = document.getElementById("statusMessage");
            statusEl.innerText = "Processing...";
            statusEl.style.color = "#666";

            const email = document.getElementById("email").value.trim();

            try {
                const response = await fetch(`${API_BASE}/forgot-password`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (data.success) {
                    statusEl.style.color = "#2e7d32";
                    statusEl.innerText = "Reset email sent! Check your inbox.";
                } else {
                    statusEl.style.color = "#c62828";
                    statusEl.innerText = data.message || "Request failed.";
                }
            } catch (error) {
                statusEl.style.color = "#c62828";
                statusEl.innerText = "Cannot connect to server.";
            }
        });
    </script>
</body>

</html>
