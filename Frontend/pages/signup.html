<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAgCO Member Registration</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../images/logo.png">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <img src="../images/logo.png" alt="NAgCO Loan Management System Logo">
                <h2>NAgCO Loan Management System</h2>
                <p>Napilihan Agriculture Cooperative</p>
            </div>
            
            <form id="signupForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <div class="input-field">
                        <i class="fa fa-user"></i>
                        <input type="text" id="fullname" placeholder="Enter full name" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Username</label>
                    <div class="input-field">
                        <i class="fa fa-user-circle"></i>
                        <input type="text" id="username" placeholder="Enter username" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-field">
                        <i class="fa fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter email address" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-field">
                        <i class="fa fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <div class="input-field">
                        <i class="fa fa-check-circle"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                    </div>
                </div>

                <button type="button" class="login-btn" onclick="register()">Register Account</button>
                <div class="signup-link">
                    Already have an account? <a href="login.html">Log In</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        async function register() {
            let name = document.getElementById("fullname").value.trim();
            let username = document.getElementById("username").value.trim().toLowerCase();
            let email = document.getElementById("email").value.trim().toLowerCase();
            let password = document.getElementById("password").value;
            let confirmPassword = document.getElementById("confirmPassword").value;

            if (name === "" || username === "" || email === "" || password === "" || confirmPassword === "") {
                alert("Please complete all fields");
                return;
            }

            if (password !== confirmPassword) {
                alert("Passwords do not match");
                return;
            }

            try {
                const response = await fetch("http://127.0.0.1:5000/api/signup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        fullname: name,
                        username: username,
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    alert("Registration submitted. Wait for admin approval.");
                    window.location.href = "login.html";
                } else {
                    alert(data.message || "Registration failed");
                }
            } catch (error) {
                alert("Cannot connect to server. Make sure backend is running.");
            }
        }
    </script>
</body>

</html>
