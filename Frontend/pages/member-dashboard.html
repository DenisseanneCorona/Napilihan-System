<!DOCTYPE html>
<html lang="en">
<head>
<script>
if (localStorage.getItem("role") !== "member") {
window.location.href = "login.html";
}
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Dashboard | NAgCO</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* Dashboard layout */
        .dashboard-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* Info cards row */
        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 200px;
            background: white;
            padding: 20px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            border-left: 4px solid #2e7d32;
        }

        .card h3 {
            color: #555;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .card p, .card div {
            font-size: 18px;
            font-weight: 600;
            color: #2e7d32;
        }

        /* Request Loan button row */
        .action-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .request-loan-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 11px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .request-loan-btn:hover {
            background: #1b5e20;
        }

        /* Transaction History section */
        .transaction-section {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            padding: 24px;
            width: 100%;
        }

        .transaction-section h2 {
            font-size: 17px;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e8f5e9;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .transaction-section h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: #2e7d32;
            border-radius: 2px;
        }

        /* Transaction table */
        #transactionTable {
            width: 100%;
            border-collapse: collapse;
            overflow-x: auto;
            display: block;
        }

        #transactionTable th {
            background: #f0f7f0;
            color: #2e7d32;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            padding: 12px 14px;
            text-align: left;
            white-space: nowrap;
        }

        #transactionTable td {
            padding: 11px 14px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
            white-space: nowrap;
            color: #444;
        }

        #transactionTable tr:last-child td {
            border-bottom: none;
        }

        #transactionTable tbody tr:hover {
            background: #fafff9;
        }

        @media (max-width: 768px) {
            .cards { flex-direction: column; }
            #transactionTable { font-size: 13px; }
            #transactionTable th, #transactionTable td { padding: 9px 10px; }
        }
    </style>
</head>
<body>
<div class="sidebar">
    <h2 class="logo">NAgCO</h2>
    <ul>
        <li class="active"><i class="fa fa-home"></i> Dashboard</li>
        <li onclick="openLoanForm()"><i class="fa fa-hand-holding-dollar"></i> Request Loan</li>
        <li onclick="logout()"><i class="fa fa-sign-out"></i> Logout</li>
    </ul>
</div>

<div class="main-content dashboard-wrapper">
    <h1 style="margin-bottom: 20px; font-size: 22px; color: #2e7d32;">Member Dashboard</h1>

    <!-- Info Cards -->
    <div class="cards">
        <div class="card">
            <h3>Loan Status</h3>
            <p id="loanStatus">No Active Loan</p>
        </div>
        <div class="card">
            <h3>Next Payment</h3>
            <p id="nextPayment">None</p>
        </div>
        <div class="card">
            <h3>Announcements</h3>
            <div id="announcementList">Loading announcements...</div>
        </div>
    </div>

    <!-- Action Bar -->
    <div class="action-bar">
        <button class="request-loan-btn" onclick="openLoanForm()">
            <i class="fa fa-plus"></i> Request Loan
        </button>
    </div>

    <!-- Transaction History — always below the cards -->
    <div class="transaction-section">
        <h2>Transaction History</h2>
        <table id="transactionTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Loan Type</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Due Date</th>
                    <th>Penalty</th>
                    <th>Notes</th>
                </tr>
            </thead>
            <tbody id="transactionBody">
            </tbody>
        </table>
    </div>
</div>

<div id="loanModal" class="modal">
    <div class="modal-content">
        <h2>Loan Request</h2>
        <label for="loanType">Loan Type</label>
        <select id="loanType">
            <option value="">Loading loan types...</option>
        </select>
        <input type="number" id="loanAmount" placeholder="Loan Amount">
        <button onclick="calculateLoan()">Calculate Loan</button>
        <div id="loanSummary"></div>
        <button onclick="submitLoan()">Submit Request</button>
        <button onclick="closeLoanForm()">Cancel</button>
    </div>
</div>

<script src="../js/member/member.js?v=20260416f"></script>
</body>
</html>
