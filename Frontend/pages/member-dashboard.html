<!DOCTYPE html>
<html lang="en">
<head>
<script>
if (localStorage.getItem("role") !== "member") {
window.location.href = "login.html";
}
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Dashboard | NAgCO</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="sidebar">
<h2 class="logo">NAgCO</h2>
<ul>
<li class="active"><i class="fa fa-home"></i> Dashboard</li>
<li onclick="openLoanForm()"><i class="fa fa-hand-holding-dollar"></i> Request Loan</li>
<li onclick="logout()"><i class="fa fa-sign-out"></i> Logout</li>
</ul>
</div>

<div class="main-content">
<h1>Member Dashboard</h1>
<div class="cards">
<div class="card">
<h3>Loan Status</h3>
<p id="loanStatus">No Active Loan</p>
</div>
<div class="card">
<h3>Next Payment</h3>
<p id="nextPayment">None</p>
</div>
<div class="card">
<h3>Announcements</h3>
<div id="announcementList">Loading announcements...</div>
</div>

<div class="card">
<h3>Email OTP</h3>
<p id="memberTwoFactorStatus">Loading OTP status...</p>
<button type="button" class="request-loan-btn" style="position:static; margin-top:10px;" onclick="toggleMemberTwoFactor(true)">Enable Email OTP</button>
<button type="button" class="request-loan-btn" style="position:static; margin-top:10px; background:#757575;" onclick="toggleMemberTwoFactor(false)">Disable Email OTP</button>
</div>
</div>

<h2>Transaction History</h2>
<table id="transactionTable">
<tr>
<th>Date</th>
<th>Loan Type</th>
<th>Amount</th>
<th>Status</th>
<th>Due Date</th>
<th>Penalty</th>
<th>Notes</th>
</tr>
</table>

<button class="request-loan-btn" onclick="openLoanForm()">
<i class="fa fa-plus"></i> Request Loan
</button>
</div>

<div id="loanModal" class="modal">
<div class="modal-content">
<h2>Loan Request</h2>
<label for="loanType">Loan Type</label>
<select id="loanType">
<option value="">Loading loan types...</option>
</select>
<input type="number" id="loanAmount" placeholder="Loan Amount">
<button onclick="calculateLoan()">Calculate Loan</button>
<div id="loanSummary"></div>
<button onclick="submitLoan()">Submit Request</button>
<button onclick="closeLoanForm()">Cancel</button>
</div>
</div>

<script src="../js/member/member.js?v=20260416f"></script>
</body>
</html>
