<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        if (localStorage.getItem("role") !== "admin") {
            alert("Admin only");
            window.location.href = "login.html";
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members | NAgCO</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../images/logo.png">
</head>

<body>
    <div class="sidebar">
        <div class="logo-left">
            <img src="../images/logo.png" alt="NAgCO Logo" class="logo-img">
            <h2 class="logo-text">NAgCO</h2>
        </div>
        <ul>
            <li onclick="goDashboard()"><i class="fa fa-home"></i> Dashboard</li>
            <li onclick="goLoan()"><i class="fa fa-hand-holding-dollar"></i> Loan Management</li>
            <li onclick="goReports()"><i class="fa fa-chart-line"></i> Reports</li>
            <li class="active"><i class="fa fa-users"></i> Members</li>
            <li onclick="logout()"><i class="fa fa-sign-out"></i> Logout</li>
        </ul>
    </div>

    <div class="main-content">
        <div class="topbar" style="display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <h1 style="margin: 0; font-size: 20px; color: #2e7d32;">Member Management</h1>
                <input type="text" id="searchMember" placeholder="Search member..." onkeyup="searchTable()" style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; width: 250px; font-size: 14px;">
            </div>
            <div class="top-icons" style="display: flex; align-items: center; gap: 15px; color: #555;">
                <i class="fa fa-bell" style="cursor: pointer; font-size: 18px;" onclick="showNotifications()"></i>
                <i class="fa fa-user-circle" style="cursor: pointer; font-size: 22px; color: #2e7d32;" onclick="openProfile()"></i>
            </div>
        </div>

        <h2 id="membersSection">Members</h2>
        <table id="memberTable">
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Status</th>
                <th>Role</th>
                <th>Action</th>
            </tr>
        </table>

        <!-- Edit Role Modal -->
        <div id="editRoleModal"
            style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999;">
            <div
                style="max-width:400px; margin:10vh auto; background:#fff; border-radius:12px; padding:24px; box-shadow:0 8px 25px rgba(0,0,0,0.18);">
                <h3 style="margin-top:0; color:#2e7d32;">Edit User Role</h3>
                <p id="editRoleUsername" style="margin-bottom:16px; color:#555;"></p>
                <label for="roleSelect" style="display:block; margin-bottom:8px; font-weight:500;">Role</label>
                <select id="roleSelect"
                    style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; margin-bottom:16px;">
                    <option value="member">Member</option>
                    <option value="admin">Admin</option>
                </select>
                <div style="display:flex; gap:10px;">
                    <button type="button" class="login-btn" style="margin-top:0;" onclick="saveUserRole()">Save</button>
                    <button type="button" class="login-btn" style="margin-top:0; background:#757575;"
                        onclick="closeEditRoleModal()">Cancel</button>
                </div>
            </div>
        </div>

        <script src="../js/admin/admin.js"></script>
</body>
</html>
